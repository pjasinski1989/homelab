apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 10m
  chart:
    spec:
      chart: reloader
      version: "2.2.8"
      sourceRef:
        kind: HelmRepository
        name: stakater
  values:
    reloader:
      autoReloadAll: true
      watchGlobally: true
