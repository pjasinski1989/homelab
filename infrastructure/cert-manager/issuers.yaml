apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "Homelab Root CA"
  duration: 87600h # 10 years
  renewBefore: 8760h # 1 year
  secretName: lab-ca-secret
  subject:
    organizations:
      - "Homelab"
    organizationalUnits:
      - "Infrastructure"
    countries:
      - "PL"
    provinces:
      - "Warmia-Masuria"
    localities:
      - "Olsztyn"
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca-issuer
spec:
  ca:
    secretName: lab-ca-secret
