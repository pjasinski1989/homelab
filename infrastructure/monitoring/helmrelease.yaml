apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.72.2"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
  values:
    victoria-metrics-operator:
      operator:
        disable_prometheus_converter: false
    vmsingle:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: lab-ca-issuer
          cert-manager.io/common-name: prometheus.lab
          cert-manager.io/subject-organizations: Homelab
          cert-manager.io/subject-organizationalunits: Infrastructure
        hosts:
          - prometheus.lab
        paths:
          - /
        tls:
          - hosts:
              - prometheus.lab
            secretName: prometheus-tls
      spec:
        retentionPeriod: "7d"
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi
        resources:
          requests:
            memory: 128Mi
          limits:
            memory: 256Mi
    vmagent:
      spec:
        resources:
          requests:
            memory: 64Mi
          limits:
            memory: 128Mi
    vmalert:
      enabled: true
    alertmanager:
      enabled: true
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: lab-ca-issuer
          cert-manager.io/common-name: alertmanager.lab
          cert-manager.io/subject-organizations: Homelab
          cert-manager.io/subject-organizationalunits: Infrastructure
        hosts:
          - alertmanager.lab
        paths:
          - /
        tls:
          - hosts:
              - alertmanager.lab
            secretName: alertmanager-tls
      spec:
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 500Mi
    grafana:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: lab-ca-issuer
          cert-manager.io/common-name: grafana.lab
          cert-manager.io/subject-organizations: Homelab
          cert-manager.io/subject-organizationalunits: Infrastructure
        hosts:
          - grafana.lab
        tls:
          - hosts:
              - grafana.lab
            secretName: grafana-tls
      initChownData:
        enabled: false
      persistence:
        enabled: true
        size: 1Gi
      securityContext:
        fsGroup: 472
        runAsGroup: 472
        runAsUser: 472
    kubeEtcd:
      enabled: true
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
