apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.4.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  values:
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 500Mi
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: lab-ca-issuer
          cert-manager.io/common-name: alertmanager.lab
          cert-manager.io/subject-organizations: Homelab
          cert-manager.io/subject-organizationalunits: Infrastructure
        hosts:
          - alertmanager.lab
        paths:
          - /
        tls:
          - hosts:
              - alertmanager.lab
            secretName: alertmanager-tls
    grafana:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: lab-ca-issuer
          cert-manager.io/common-name: grafana.lab
          cert-manager.io/subject-organizations: Homelab
          cert-manager.io/subject-organizationalunits: Infrastructure
        hosts:
          - grafana.lab
        tls:
          - hosts:
              - grafana.lab
            secretName: grafana-tls
      initChownData:
        enabled: false
      persistence:
        enabled: true
        size: 1Gi
      securityContext:
        fsGroup: 472
        runAsGroup: 472
        runAsUser: 472
    prometheus:
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: lab-ca-issuer
          cert-manager.io/common-name: prometheus.lab
          cert-manager.io/subject-organizations: Homelab
          cert-manager.io/subject-organizationalunits: Infrastructure
        hosts:
          - prometheus.lab
        paths:
          - /
        tls:
          - hosts:
              - prometheus.lab
            secretName: prometheus-tls
      prometheusSpec:
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        retention: 7d
        resources:
          requests:
            memory: 256Mi
          limits:
            memory: 512Mi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi
