apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 10m
  chart:
    spec:
      chart: headlamp
      version: "0.40.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
  values:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: lab-ca-issuer
        cert-manager.io/common-name: headlamp.lab
        cert-manager.io/subject-organizations: Homelab
        cert-manager.io/subject-organizationalunits: Infrastructure
      hosts:
        - host: headlamp.lab
          paths:
            - path: /
              type: Prefix
      tls:
        - hosts:
            - headlamp.lab
          secretName: headlamp-tls
