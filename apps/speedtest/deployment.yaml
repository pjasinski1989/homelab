apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-tracker
  namespace: speedtest
  labels:
    app.kubernetes.io/name: speedtest-tracker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: speedtest-tracker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: speedtest-tracker
    spec:
      containers:
      - name: speedtest-tracker
        image: lscr.io/linuxserver/speedtest-tracker:latest
        ports:
        - containerPort: 80
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: Europe/Warsaw
        - name: SPEEDTEST_SCHEDULE
          value: "0 * * * *"
        - name: DB_CONNECTION
          value: sqlite
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: speedtest-app-key
              key: APP_KEY
        - name: APP_URL
          value: https://speedtest.lab
        - name: DISPLAY_TIMEZONE
          value: Europe/Warsaw
        resources:
          requests:
            memory: "64Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
        volumeMounts:
        - name: config
          mountPath: /config
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: speedtest-config
